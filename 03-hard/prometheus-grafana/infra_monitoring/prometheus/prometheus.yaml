# my global config

global:
  scrape_interval: 15s # pull metrics
  # evaluation_interval: 300s # run alerting/recording rules

# rule_files:
  # - "alerts.yaml" # Load alerting rules from this file

scrape_configs:
  - job_name: "prometheus" # scrape Prometheus itself
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
  
  - job_name: "mongo-exporter"
    static_configs:
      - targets: ["mongo-exporter:9216"]
  
  - job_name: "nginx-exporter"
    static_configs:
      - targets: ["nginx-exporter:9113"]