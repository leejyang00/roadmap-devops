volumes:
  prometheus_data:
  grafana_data:

services:

  grafana-service:
    image: grafana/grafana
    container_name: grafana-service
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra_monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./infra_monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PWD}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus-service

  prometheus-service:
    image: prom/prometheus:latest
    container_name: prometheus-container
    hostname: prometheus-hostname
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra_monitoring/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml # Mount local config file into the container's expected path
      # TBD: alerting rules
      # TBD: recording rule
      - prometheus_data:/prometheus # Provide persistent storage for metrics data
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml' # specifying where config filecd 
      - '--storage.tsdb.path=/prometheus' # to ensure persistent storage
      - '--web.enable-lifecycle'

  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    expose:
      - 9100
    volumes:
      - '/proc:/host/proc:ro'
      - '/sys:/host/sys:ro'
      - '/:/rootfs:ro'
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    depends_on:
      - prometheus-service
    pid: host

  mongo-exporter:
    image: percona/mongodb_exporter:0.49.0
    container_name: mongo-exporter
    restart: unless-stopped
    command:
      - '--mongodb.uri=${MONGO_URI}' # defined in .env
      - '--collect-all'
      - '--discovering-mode'
    ports:
      - "9216:9216"
    networks:
      - default
      - monitoring_link
      
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.5.1
    container_name: nginx-exporter
    restart: unless-stopped
    ports:
      - "9113:9113"
    command:
      - '-nginx.scrape-uri=http://nginx:8081/stub_status'
    networks:
      - default
      - monitoring_link

networks:
  monitoring_link: # external network has to be created first 
    external: true
